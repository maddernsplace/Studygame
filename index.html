<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>School Quest Dashboard</title>
    <link rel="stylesheet" href="style.css?v=5">
  </head>
  <body>
    <header class="app-header">
      <button class="icon-button hidden" id="backButton" type="button" aria-label="Go back">
        <span aria-hidden="true">&#8592;</span>
      </button>
      <div>
        <p class="eyebrow">School Quest</p>
        <h1 id="pageTitle">Pick Your Adventure</h1>
      </div>
      <div class="coin-counter" aria-label="Total progress">
        <span aria-hidden="true">&#9733;</span>
        <strong id="totalProgress">0%</strong>
      </div>
    </header>

    <main id="app" class="app-shell" aria-live="polite"></main>

    <script src="data/year4-times-tables.js?v=3"></script>
    <script src="data/year3-english.js?v=4"></script>
    <script src="data/year3-grammar.js?v=5"></script>
    <script src="data/year34-spelling.js?v=1"></script>
    <script src="data/year4-tricky-words.js?v=1"></script>
    <script src="data/year4-column-maths.js?v=1"></script>
    <script src="data/rewards.js?v=1"></script>
    <script src="data/maths.js?v=3"></script>
    <script src="data/english.js?v=3"></script>
    <script src="data/science.js?v=3"></script>
    <script src="data/technology.js?v=3"></script>
    <script src="script.js?v=7"></script>
    <script type="module" src="firebase-sync.js?v=1"></script>
  </body>
</html>
